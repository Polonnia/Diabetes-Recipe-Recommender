<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ЬЧФђВЁвћЪГЭЦМіЯЕЭГ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-KyZXEJ6b7m8uPwbKpc78i6i7M9wvM2e3lKkKNSj0D3eV6/e27k9I47ITl/4SK+np" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container mt-5">
        <h1 class="text-center">ЬЧФђВЁвћЪГЭЦМіЯЕЭГ</h1>

        <!-- гУЛЇаХЯЂРИ -->
        <div class="card mt-3">
            <div class="card-header">
                <h3>ЧыЪфШыФњЕФНЁПЕаХЯЂ</h3>
            </div>
            <div class="card-body">
                <form id="user-data-form">
                    <div class="mb-3">
                        <label for="height" class="form-label">ЩэИп (cm)</label>
                        <input type="number" class="form-control" id="height" required>
                    </div>
                    <div class="mb-3">
                        <label for="weight" class="form-label">Ьхжи (kg)</label>
                        <input type="number" class="form-control" id="weight" required>
                    </div>
                    <div class="mb-3">
                        <label for="age" class="form-label">ФъСф</label>
                        <input type="number" class="form-control" id="age" required>
                    </div>
                    <div class="mb-3">
                        <label for="gender" class="form-label">адБ№</label>
                        <select class="form-control" id="gender" required>
                            <option value="male">Фа</option>
                            <option value="female">ХЎ</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="pre-meal-glucose" class="form-label">ВЭЧАбЊЬЧ (mg/dL)</label>
                        <input type="number" class="form-control" id="pre-meal-glucose" required>
                    </div>
                    <div class="mb-3">
                        <label for="pre-meal-insulin" class="form-label">ВЭЧАвШЕКЫиСП (ЕЅЮЛ)</label>
                        <input type="number" class="form-control" id="pre-meal-insulin" required>
                    </div>

                    <!-- дЫЖЏЫЎЦНбЁдё -->
                    <div class="mb-3">
                        <label for="activity-level" class="form-label">дЫЖЏЫЎЦН</label>
                        <select class="form-control" id="activity-level" required>
                            <option value="sedentary">ОУзјЩйЖЏЃЈМИКѕВЛдЫЖЏЃЉ</option>
                            <option value="lightly_active">ЧсЖШЛюЖЏЃЈЧсЖШдЫЖЏ/ЩйСПдЫЖЏЃЉ</option>
                            <option value="moderately_active">жаЖШЛюЖЏЃЈжаЕШЧПЖШдЫЖЏ/УПжмЖЭСЖ3-5ДЮЃЉ</option>
                            <option value="very_active">ИпЖШЛюЖЏЃЈОчСвдЫЖЏ/УПЬьЖЭСЖЛђУПжмдЫЖЏ6-7ДЮЃЉ</option>
                            <option value="extra_active">МЋЖШЛюЖЏЃЈЗЧГЃОчСвдЫЖЏ/УПЬьЖрДЮЖЭСЖЛђЙЄзїЃЉ</option>
                        </select>
                    </div>

                    <button type="submit" class="btn btn-primary w-100">ЬсНЛНЁПЕаХЯЂ</button>
                </form>
            </div>
        </div>

        <!-- ЭЦМіЪГЦзеЙЪО -->
        <div id="recipe-recommendation" class="card mt-5" style="display: none;">
            <div class="card-header">
                <h3>ЭЦМіЪГЦз</h3>
            </div>
            <div class="card-body">
                <div id="recommended-recipes">
                    <!-- ЖЏЬЌЩњГЩЭЦМіЪГЦз -->
                </div>
                <div id="recipe-feedback">
                    <h5>ЧыЪфШыФњЕФЦРЗжгыВЭКѓбЊЬЧ</h5>
                    <div class="mb-3">
                        <label for="rating" class="form-label">ЪГЦзЦРЗж (0-10)</label>
                        <input type="number" class="form-control" id="rating" min="0" max="10" required>
                    </div>
                    <div class="mb-3">
                        <label for="post-meal-glucose" class="form-label">ВЭКѓбЊЬЧ (60min, 120min, 180min)</label>
                        <input type="text" class="form-control" id="post-meal-glucose" placeholder="ШчЃК150, 180, 200" required>
                    </div>
                    <button id="submit-feedback" class="btn btn-success w-100">ЬсНЛЗДРЁ</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js" integrity="sha384-GLhlTQ8iRABLrzr+rWz0v3p0Kmq2kp6E1u6nvk9yyjwD0hfe5gJsdmJwvnq2JH6i" crossorigin="anonymous"></script>
    <script src="app.js"></script>
</body>
</html>
